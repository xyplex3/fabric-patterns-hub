---
# A well-structured playbook following Ansible best practices
# Usage: ansible-playbook playbooks/webserver.yml -i inventory/

- name: Configure web servers
  hosts: "{{ target | default('webservers') }}"
  become: true
  gather_facts: true
  gather_subset:
    - network
    - hardware

  vars_files:
    - vars/common.yml

  pre_tasks:
    - name: Update apt cache on Debian systems
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

  roles:
    - role: common
      tags:
        - common
        - base
    - role: nginx
      tags:
        - nginx
        - web
    - role: ssl_certificates
      tags:
        - ssl
        - security

  post_tasks:
    - name: Verify nginx service is running
      ansible.builtin.service_facts:

    - name: Assert nginx is active
      ansible.builtin.assert:
        that:
          - ansible_facts.services['nginx.service'].state == 'running'
        fail_msg: "Nginx service is not running"
        success_msg: "Nginx service is running"

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      listen: nginx configuration changed

---
# Example role tasks file showing best practices
# roles/nginx/tasks/main.yml

- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yml"
        - "{{ ansible_facts['distribution'] }}.yml"
        - "{{ ansible_facts['os_family'] }}.yml"
        - default.yml
      paths:
        - vars

- name: Ensure nginx is installed
  ansible.builtin.package:
    name: "{{ nginx_package_name }}"
    state: present

- name: Ensure nginx configuration directory exists
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s
  notify: nginx configuration changed

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Check nginx version
  ansible.builtin.command: nginx -v
  register: nginx_version_output
  changed_when: false
  check_mode: false

- name: Display nginx version
  ansible.builtin.debug:
    msg: "Nginx version: {{ nginx_version_output.stderr }}"
