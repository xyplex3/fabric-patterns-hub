---
# A playbook with common anti-patterns for testing the ansible-review pattern

- hosts: all
  tasks:
    # Missing name, using short module name
    - apt:
        name: nginx
        state: latest

    # Non-idempotent command without guards
    - name: install dependencies
      command: apt-get install -y curl wget
      become: yes

    # Hardcoded password - security issue
    - name: create database user
      user:
        name: dbadmin
        password: "supersecretpassword123"

    # Shell with pipe - risky
    - name: get running processes
      shell: ps aux | grep nginx | wc -l

    # Missing FQCN, unquoted mode
    - name: Create config directory
      file:
        path: /etc/myapp
        state: directory
        mode: 0755

    # Jinja2 not quoted
    - name: Template config
      template:
        src: {{ config_template }}
        dest: /etc/myapp/config.yml

    # Using yes/no instead of true/false
    - name: Enable service
      service:
        name: nginx
        enabled: yes
        state: started

    # Complex conditional
    - name: Do something complicated
      debug:
        msg: "Complex logic"
      when: (var1 == 'a' and var2 == 'b') or (var3 == 'c' and var4 in ['d', 'e']) or (var5 | length > 3)

    # Missing changed_when
    - name: Check version
      command: /opt/app/version.sh
      register: version_output

    # Secret in plain text variable
    - name: Set API key
      set_fact:
        api_key: "sk-1234567890abcdef"

    # Using deprecated syntax
    - name: Install multiple packages
      apt:
        name: "{{ item }}"
      with_items:
        - vim
        - htop
        - tree

    # Handler without proper naming
    - name: restart nginx
      service: name=nginx state=restarted
      listen: nginx config changed
